<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecionando...</title>
    <script>
      // Redireciona qualquer rota 404 para o index.html
      var path = location.pathname;
      if (!path.endsWith('index.html')) {
        sessionStorage.redirect = path + location.search;
        location.replace('/nr-solucoes-portfolio/index.html');
      }
    </script>
  </head>
  <body>
  </body>
</html>
